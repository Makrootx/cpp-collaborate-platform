convention:
  # commitMessageRegexPattern:
  # ^(?<type>\w+)(?:\((?<scope>[^()]+)\))?(?<breaking>!)?:\s*(?<description>.+)
  commitTypes:
    - feat     # Add or remove a new feature
    - fix      # Fix a bug
    - refactor # Rewrite/restructure code without changing behaviour
    - perf     # Improve performance
    - style    # Formatting, missing semi-colons, etc. (no logic change)
    - test     # Add missing or correct existing tests
    - build    # Build system, CI pipeline, dependencies, project version
    - ops      # Infrastructure, deployment, backup, recovery
    - docs     # Documentation only
    - chore    # Miscellaneous (e.g. modifying .gitignore)
    - merge    # Merge commits
  commitScopes: []
  releaseTagGlobPattern: v[0-9]*.[0-9]*.[0-9]*

changelog:
  commitTypes:
    - feat
    - fix
    - perf
    - merge
  includeInvalidCommits: true
  commitScopes: []
  commitIgnoreRegexPattern: "^WIP "
  headlines:
    feat: Features
    fix: Bug Fixes
    perf: Performance Improvements
    merge: Merges
    breakingChange: BREAKING CHANGES
